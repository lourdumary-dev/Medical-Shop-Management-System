<!DOCTYPE html>
<html>

<head>
    <title>Medical Shop Login</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="dashboard">

    <h1>🏥 MEDICAL SHOP</h1>

    <h2>Management System</h2>

    <p style="color:#555;">
        Welcome Admin! Please login to continue.
    </p>

    <form action="/login" method="POST">

        <input
            type="text"
            name="username"
            placeholder="👤 Enter Username"
            required>

        <br>

        <input
            type="password"
            name="password"
            placeholder="🔒 Enter Password"
            required>

        <br><br>

        <button type="submit">
            Login
        </button>

    </form>

</div>

</body>

</html>
