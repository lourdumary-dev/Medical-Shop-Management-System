<!DOCTYPE html>
<html>

<head>
    <title>Add Medicine</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="dashboard">

    <h1>ADD MEDICINE</h1>

    <form action="/save_medicine" method="POST">

        <label>Medicine Name</label><br>
        <input
            type="text"
            name="medicine_name"
            placeholder="Medicine Name"
            required
        >

        <br><br>

        <label>Company Name</label><br>
        <input
            type="text"
            name="company"
            placeholder="Company Name"
            required
        >

        <br><br>

        <label>Price</label><br>
        <input
            type="number"
            name="price"
            placeholder="Price"
            required
        >

        <br><br>

        <label>Quantity</label><br>
        <input
            type="number"
            name="quantity"
            placeholder="Quantity"
            required
        >

        <br><br>

        <label>Expiry Date</label><br>
        <input
            type="date"
            name="expiry_date"
            required
        >

        <br><br>

        <button type="submit">
            SAVE MEDICINE
        </button>

    </form>

</div>

</body>

</html>
