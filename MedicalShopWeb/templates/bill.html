<!DOCTYPE html>
<html>
<head>

    <title>LourLee Pharmacy Bill</title>

    <style>

        body{

            font-family:Arial,sans-serif;

            background:#f5f5f5;

        }

        .bill{

            width:600px;

            margin:30px auto;

            background:white;

            padding:30px;

            border-radius:15px;

            box-shadow:0px 0px 10px gray;

        }

        .logo-section{

            text-align:center;

        }

        .logo{

            width:180px;

            height:auto;

        }

        h1{

            text-align:center;

            color:#0b7285;

        }

        h3{

            margin:15px 0;

        }

        h2{

            color:green;

            text-align:right;

        }

        button{

            width:100%;

            padding:12px;

            background:#0b7285;

            color:white;

            border:none;

            border-radius:8px;

            font-size:18px;

            cursor:pointer;

        }

        button:hover{

            background:#087f5b;

        }

    </style>

</head>

<body>

<div class="bill">

<div class="logo-section">

<img src="{{ url_for('static', filename='images/logo.png') }}" class="logo">

</div>

<h1>LourLee Pharmacy</h1>

<hr>

<h3>Customer Name : {{ customer_name }}</h3>

<h3>Medicine Name : {{ medicine_name }}</h3>

<h3>Price : ₹{{ price }}</h3>

<h3>Quantity : {{ quantity }}</h3>

<hr>

<h2>Total Amount : ₹{{ total }}</h2>

<button onclick="window.print()">

Print Bill

</button>

</div>

</body>

</html>
