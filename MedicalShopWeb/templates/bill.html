<!DOCTYPE html>
<html>
<head>
    <title>Medical Shop Bill</title>
</head>
<body>

<h1>MEDICAL SHOP</h1>
<hr>

<h3>Customer Name : {{ customer_name }}</h3>
<h3>Medicine Name : {{ medicine_name }}</h3>
<h3>Price : ₹{{ price }}</h3>

<hr>

<h2>Total Amount : ₹{{ total }}</h2>

<br>

<button onclick="window.print()">
    Print Bill
</button>

</body>
</html>
