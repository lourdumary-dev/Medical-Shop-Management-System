<!DOCTYPE html>
<html>

<head>
    <title>Sales History</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="dashboard">

<h1>SALES HISTORY</h1>

<table border="1">

<tr>
    <th>Sale ID</th>
    <th>Customer Name</th>
    <th>Medicine Name</th>
    <th>Quantity</th>
    <th>Total Amount</th>
    <th>Sale Date</th>
</tr>

{% for sale in sales %}

<tr>

    <td>{{ sale[0] }}</td>
    <td>{{ sale[1] }}</td>
    <td>{{ sale[4] }}</td>
    <td>{{ sale[5] }}</td>
    <td>{{ sale[2] }}</td>
    <td>{{ sale[3] }}</td>

</tr>

{% endfor %}

</table>

<br>

<a href="/dashboard">
    <button>Back to Dashboard</button>
</a>

</div>

</body>
</html>
