<!DOCTYPE html>
<html>

<head>
    <title>Billing</title>
</head>

<body>

<h1>BILLING SYSTEM</h1>

<form action="/generate_bill" method="POST">
    
    <input type="text"
           name="customer_name"
           placeholder="Enter Customer Name"
           required>

<br><br>

    <input type="text"
           name="medicine_name"
           placeholder="Enter Medicine Name"
           required>

    <br><br>

    <input type="number"
           name="quantity"
           placeholder="Enter Quantity"
           required>

    <br><br>

    <button type="submit">
        Generate Bill
    </button>

</form>

</body>
</html>
